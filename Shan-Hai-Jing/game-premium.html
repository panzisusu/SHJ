<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="山海經 · 奇獸對決 Premium 卡牌對戰遊戲 (左我右敵 · 涿鹿戰界版)。">
    <title>山海經 · 奇獸對決 (Premium) | Shan-Hai-Jing Card Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
    /* ============================================================
       Light Parchment & Ink-Wash Theme (根據 Light and classic.md 規範)
       左右對立版型：左方我方陣地 | 中間豎向涿鹿戰界 | 右方魔王陣地
    ============================================================ */
    :root {
        --bg-dark-gray: #f6f3ea;      /* 暖淺灰宣紙底 */
        --bg-deep-ink: #fcfbf9;       /* 亮色宣紙白底 */
        --bg-card: rgba(253, 252, 247, 0.95); /* 半透明暖白卡片底 */
        --text-primary: #2b2621;     /* 深茶黑墨色文字 */
        --text-secondary: #5c534c;   /* 灰褐墨色文字 */
        --text-gold: #8b0000;        /* 亮點深硃砂紅 */
        --vermilion: #9e2a2b;        /* 硃砂紅 (按鈕/選取) */
        --vermilion-bright: #c0392b;
        --gold-primary: #8c6b12;     /* 古金/青銅色邊框 */
        --gold-border: rgba(140, 107, 18, 0.35);
        --blue-primary: #1a4e6e;     /* 靈力亮藍色 */
        --card-shadow: 0 4px 16px rgba(92, 80, 67, 0.15);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, .gp-wrapper {
        width: 100% !important;
        min-height: 100vh !important;
        background-color: #f6f3ea !important;
        background: #f6f3ea !important;
        color: #2b2621 !important;
        font-family: 'Noto Serif TC', -apple-system, sans-serif !important;
        overflow-x: hidden !important;
    }

    /* ── Game Card CSS (Parchment Ink-Wash Light Theme) ──────── */
    .game-card {
        width: 100%;
        height: 100%;
        background: var(--bg-card);
        border: 2px solid var(--gold-primary);
        border-radius: 6px;
        display: flex;
        flex-direction: column;
        padding: 5px;
        box-sizing: border-box;
        cursor: pointer;
        position: relative;
        box-shadow: 0 3px 8px rgba(92, 80, 67, 0.15);
        background-image: url('assets/webp/ink_wash_bg.webp');
        background-size: cover;
        transition: transform 0.25s ease, box-shadow 0.25s ease;
        user-select: none;
    }
    .game-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 18px rgba(140, 107, 18, 0.3);
    }
    .game-card.selected {
        border-color: var(--vermilion);
        box-shadow: 0 0 14px rgba(158, 42, 43, 0.5);
        transform: translateY(-8px);
    }

    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
    .card-cost {
        width: 20px; height: 20px;
        background: var(--gold-primary); color: #ffffff;
        border-radius: 50%; font-size: 0.72rem; font-weight: bold;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .card-element-badge {
        font-size: 0.68rem; font-weight: bold;
        font-family: 'Noto Serif TC', serif;
        padding: 1px 6px; border-radius: 8px;
        border: 1px solid currentColor; white-space: nowrap;
    }
    .elem-wood  { color: #2d6b4f; background: #e8f5e9; }
    .elem-fire  { color: #9e2a2b; background: #fdecea; }
    .elem-metal { color: #6b5500; background: #fff8e1; }
    .elem-water { color: #1a4e6e; background: #e3f2fd; }
    .elem-earth { color: #5d4037; background: #f3e5ab; }
    .card-type-dot { width: 8px; height: 8px; border-radius: 50%; }
    .card-type-dot.divine { background-color: #d4af37; }
    .card-type-dot.auspicious { background-color: #2d6b4f; }
    .card-type-dot.perilous { background-color: #9e2a2b; }

    .card-img-wrap {
        flex-grow: 1; width: 100%; height: 75px;
        border: 1px solid var(--gold-border); border-radius: 4px;
        overflow: hidden; background: #ffffff; position: relative;
    }
    .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .card-name-overlay {
        position: absolute; bottom: 0; left: 0; right: 0;
        background: linear-gradient(transparent, rgba(253, 252, 247, 0.95));
        color: var(--text-primary); font-size: 0.7rem;
        font-family: 'Noto Serif TC', serif; font-weight: bold;
        padding: 6px 3px 2px; text-align: center;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-stats { display: flex; justify-content: space-around; align-items: center; margin-top: 4px; font-size: 0.7rem; font-weight: bold; }
    .stat-item { display: flex; align-items: center; gap: 3px; }
    .stat-item.atk { color: var(--vermilion); }
    .stat-item.hp  { color: #2d6b4f; }

    /* Result overlay modal */
    .game-overlay-modal {
        display: none; position: fixed; inset: 0;
        background: rgba(43, 38, 33, 0.6); z-index: 999;
        align-items: center; justify-content: center;
        backdrop-filter: blur(4px);
    }
    .game-overlay-modal.active { display: flex; }
    .game-modal-content {
        background: linear-gradient(135deg, #fdfcf7 0%, #f5f0e3 100%);
        border: 2px solid var(--gold-primary);
        border-radius: 10px; padding: 28px 36px;
        text-align: center; max-width: 380px; width: 90%;
        box-shadow: 0 10px 40px rgba(92, 80, 67, 0.3);
    }
    .game-modal-content h2 { color: var(--text-gold); font-size: 1.6rem; margin-bottom: 10px; }
    .game-modal-content p  { color: var(--text-secondary); margin-bottom: 18px; font-size: 0.95rem; }
    .game-btn {
        padding: 10px 24px; border-radius: 6px;
        font-family: 'Noto Serif TC', serif; font-size: 0.95rem; font-weight: bold;
        cursor: pointer; transition: all 0.2s;
    }
    .primary-game-btn {
        background: linear-gradient(135deg, #9e2a2b, #c0392b);
        border: 1px solid var(--gold-primary); color: #ffffff;
    }
    .primary-game-btn:hover { background: linear-gradient(135deg, #c0392b, #e74c3c); transform: translateY(-2px); }

    /* Fixed particle canvas */
    #particles-canvas {
        position: fixed; inset: 0;
        pointer-events: none; z-index: 0; opacity: 0.35;
    }

    /* Page wrapper */
    .gp-wrapper {
        position: relative; z-index: 1;
        max-width: 1240px; margin: 0 auto;
        padding: 12px 16px 20px;
        display: flex; flex-direction: column; gap: 10px;
        min-height: 100vh;
        background-color: #f6f3ea !important;
    }

    /* ── Top bar ─────────────────────────────────────────────── */
    .gp-topbar {
        display: flex; align-items: center; justify-content: space-between;
        padding: 6px 0; border-bottom: 1px dashed var(--gold-border);
    }
    .gp-back {
        color: var(--vermilion); text-decoration: none;
        font-size: 0.92rem; font-weight: bold;
        display: flex; align-items: center; gap: 6px;
        transition: color 0.2s, transform 0.2s;
    }
    .gp-back:hover { color: var(--gold-primary); transform: translateX(-3px); }
    .gp-title {
        font-size: 1.6rem; color: var(--text-gold);
        letter-spacing: 3px; font-weight: bold;
        text-shadow: 0 1px 2px rgba(255, 255, 255, 0.8);
    }
    .gp-subtitle {
        font-size: 0.85rem; color: var(--text-secondary); font-weight: bold;
    }

    /* ── Event log bar ───────────────────────────────────────── */
    .gp-event-bar {
        display: flex; align-items: center; gap: 10px;
        background: var(--bg-deep-ink);
        border: 1px solid var(--gold-primary);
        border-radius: 6px; padding: 10px 16px;
        font-size: 0.92rem; font-weight: bold; color: var(--text-primary);
        box-shadow: var(--card-shadow);
    }

    /* ── Main Battle Frame ───────────────────────────────────── */
    .gp-frame, .prem-main {
        display: grid;
        grid-template-columns: 210px 1fr 210px;
        gap: 12px;
        background: linear-gradient(135deg, #fdfcf7 0%, #f6f1e5 100%) !important;
        border: 2px solid var(--gold-primary) !important;
        border-radius: 10px; padding: 12px;
        box-shadow: 0 8px 30px rgba(92, 80, 67, 0.18);
        flex: 1;
    }

    /* ── LEFT: Player Panel ─────────────────────────────────── */
    .gp-left, .prem-player-panel {
        display: flex; flex-direction: column; align-items: center; gap: 10px;
        background: #fcfbf9 !important;
        border: 1px solid var(--gold-border) !important;
        border-radius: 8px; padding: 14px 10px;
        box-shadow: 0 2px 8px rgba(92, 80, 67, 0.08);
    }

    .gp-player-avatar {
        width: 72px; height: 72px; border-radius: 50%;
        object-fit: cover; border: 3px solid var(--gold-primary);
        box-shadow: 0 3px 10px rgba(140, 107, 18, 0.25);
    }
    .gp-player-label {
        font-size: 0.9rem; color: var(--text-gold);
        font-weight: bold; letter-spacing: 2px;
    }

    .gp-bars { width: 100%; display: flex; flex-direction: column; gap: 8px; }
    .gp-bar-row { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; font-weight: bold; }
    .gp-bar-lbl { color: var(--text-secondary); width: 42px; flex-shrink: 0; }
    .gp-bar-track {
        flex: 1; height: 11px;
        background: rgba(92, 80, 67, 0.15);
        border-radius: 6px; overflow: hidden;
    }
    .gp-bar-fill { height: 100%; border-radius: 6px; transition: width 0.4s ease; }
    .gp-hp-fill { background: linear-gradient(90deg, #9e2a2b, #c0392b); }
    .gp-mp-fill { background: linear-gradient(90deg, #1a4e6e, #2980b9); }
    .gp-bar-num {
        font-size: 0.72rem; color: var(--text-primary);
        width: 50px; text-align: right; flex-shrink: 0;
    }

    .gp-skills { width: 100%; display: flex; flex-direction: column; gap: 6px; }
    .gp-skill-btn {
        width: 100%; display: flex; align-items: center; gap: 10px;
        background: #fdfcf7; border: 1px solid var(--gold-primary);
        color: var(--text-primary); font-family: 'Noto Serif TC', serif;
        font-size: 0.82rem; font-weight: bold; padding: 8px 12px;
        border-radius: 6px; cursor: pointer; transition: all 0.2s;
        box-shadow: 0 2px 4px rgba(92,80,67,0.08);
    }
    .gp-skill-btn:hover {
        background: #fff8e1; border-color: var(--vermilion);
        color: var(--vermilion); transform: translateX(3px);
    }
    .gp-skill-ico {
        width: 26px; height: 26px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 0.8rem; flex-shrink: 0;
    }
    .gp-ico-fire  { background: #fdecea; border: 1px solid #9e2a2b; color: #9e2a2b; }
    .gp-ico-water { background: #e3f2fd; border: 1px solid #1a4e6e; color: #1a4e6e; }
    .gp-ico-bolt  { background: #fff8e1; border: 1px solid #8c6b12; color: #8c6b12; }

    .gp-clash-btn {
        width: 100%; background: linear-gradient(135deg, #9e2a2b, #c0392b);
        border: 1px solid var(--gold-primary); color: #ffffff;
        font-family: 'Noto Serif TC', serif; font-size: 0.95rem; font-weight: bold;
        padding: 11px; border-radius: 6px; cursor: pointer; transition: all 0.2s;
        display: flex; align-items: center; justify-content: center; gap: 8px;
        box-shadow: 0 4px 12px rgba(158, 42, 43, 0.3); margin-top: auto;
    }
    .gp-clash-btn:hover {
        background: linear-gradient(135deg, #c0392b, #e74c3c);
        transform: translateY(-2px); box-shadow: 0 6px 16px rgba(192,57,43,0.4);
    }
    .gp-restart-btn {
        width: 100%; background: transparent;
        border: 1px solid var(--gold-border); color: var(--text-secondary);
        font-family: 'Noto Serif TC', serif; font-size: 0.78rem; font-weight: bold;
        padding: 7px; border-radius: 5px; cursor: pointer; transition: all 0.2s;
        display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .gp-restart-btn:hover { border-color: var(--gold-primary); color: var(--vermilion); }

    /* ── CENTER: Hand + Left/Right Battlefield ───────────────── */
    .gp-center { display: flex; flex-direction: column; gap: 10px; }

    .gp-hand-area {
        background: var(--bg-deep-ink); border: 1px solid var(--gold-primary);
        border-radius: 8px; padding: 10px 12px; box-shadow: var(--card-shadow);
    }
    .gp-hand-lbl {
        font-size: 0.82rem; font-weight: bold; color: var(--text-gold);
        margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between;
    }
    .gp-hand-cards {
        display: flex; gap: 9px; overflow-x: auto;
        min-height: 125px; align-items: flex-start; padding-bottom: 4px;
        -webkit-overflow-scrolling: touch;
    }
    .gp-hand-cards::-webkit-scrollbar { height: 5px; }
    .gp-hand-cards::-webkit-scrollbar-track { background: rgba(92,80,67,0.1); }
    .gp-hand-cards::-webkit-scrollbar-thumb { background: var(--gold-primary); border-radius: 3px; }

    .gp-hand-cards .game-card {
        flex-shrink: 0 !important; width: 95px !important;
        cursor: pointer !important; transition: transform 0.2s, box-shadow 0.2s !important;
    }
    .gp-hand-cards .game-card:hover {
        transform: translateY(-8px) !important;
        box-shadow: 0 10px 20px rgba(140,107,18,0.35) !important;
    }
    .gp-hand-cards .game-card.selected {
        transform: translateY(-10px) !important;
        box-shadow: 0 0 16px rgba(158,42,43,0.6) !important;
        border-color: var(--vermilion) !important;
    }

    /* ── ⚔️ NEW: Left vs Right Battlefield Layout (左我右敵) ─── */
    .gp-battlefield-sides {
        flex: 1; position: relative; border-radius: 8px; overflow: hidden;
        border: 2px solid var(--gold-primary);
        background-image: url('assets/webp/ink_wash_bg.webp');
        background-size: cover; background-position: center;
        display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px;
        padding: 12px 14px; min-height: 240px;
        box-shadow: inset 0 0 20px rgba(92, 80, 67, 0.15);
        align-items: center;
    }
    .gp-battlefield-sides::before {
        content: ''; position: absolute; inset: 0;
        background: rgba(253, 252, 247, 0.4);
        pointer-events: none; z-index: 0;
    }

    /* Player 4 slots (Left, 2x2 grid) */
    .gp-player-side, .gp-enemy-side {
        display: flex; flex-direction: column; gap: 6px;
        position: relative; z-index: 1; flex: 1;
    }

    .gp-player-row-grid, .gp-enemy-row-grid {
        display: grid; grid-template-columns: 1fr 1fr; gap: 8px; flex: 1;
    }

    .gp-slot {
        background: rgba(253, 252, 247, 0.95);
        border: 2px dashed var(--gold-primary);
        border-radius: 6px; min-height: 108px;
        display: flex; align-items: center; justify-content: center;
        font-size: 0.82rem; font-weight: bold; color: var(--text-secondary);
        transition: all 0.2s; position: relative;
        box-shadow: 0 2px 6px rgba(92,80,67,0.08);
    }
    .gp-player-slot { cursor: pointer; border-color: var(--gold-primary); }
    .gp-player-slot:hover {
        border-color: var(--vermilion); background: #fff8e1;
        color: var(--vermilion); box-shadow: 0 0 12px rgba(158,42,43,0.3);
    }
    .gp-player-slot.active-target {
        border-color: var(--vermilion); background: #fdecea;
        animation: gp-pulse 0.8s ease-in-out infinite alternate;
    }
    .gp-enemy-slot { border-color: rgba(158,42,43,0.4); background: rgba(253,252,247,0.85); }
    @keyframes gp-pulse {
        from { box-shadow: 0 0 0 0 rgba(158,42,43,0.4); }
        to   { box-shadow: 0 0 0 8px rgba(158,42,43,0); }
    }

    .gp-slot .game-card { width: 100% !important; min-height: 92px !important; font-size: 0.72rem !important; cursor: default !important; }

    /* 📜 Vertical Divider (豎向楚河漢界 / 涿鹿戰界印章) */
    .gp-vertical-divider {
        position: relative; z-index: 1;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100%; padding: 0 4px;
    }
    .gp-vertical-divider::before {
        content: ''; position: absolute; top: 8px; bottom: 8px; width: 2px;
        background: var(--gold-primary); z-index: 0;
    }
    .gp-vertical-seal {
        background: #fdfcf7; border: 2px solid var(--vermilion);
        color: var(--vermilion); font-size: 0.85rem; font-weight: bold;
        padding: 12px 5px; border-radius: 6px; position: relative; z-index: 1;
        writing-mode: vertical-rl; text-orientation: upright;
        letter-spacing: 6px; box-shadow: 0 3px 10px rgba(158,42,43,0.25);
        font-family: 'Noto Serif TC', serif;
    }

    /* ── RIGHT: Boss Panel ─────────────────────────────────── */
    .gp-right, .prem-boss-panel {
        display: flex; flex-direction: column; align-items: center; gap: 10px;
        background: #fcfbf9 !important; border: 1px solid var(--gold-border) !important;
        border-radius: 8px; padding: 14px 10px;
        box-shadow: 0 2px 8px rgba(92, 80, 67, 0.08);
    }

    .gp-boss-hp-section { width: 100%; }
    .gp-boss-hp-lbl { font-size: 0.85rem; font-weight: bold; color: var(--text-gold); text-align: center; margin-bottom: 4px; }
    .gp-boss-hp-row { display: flex; align-items: center; gap: 6px; }
    .gp-boss-hp-pct { font-size: 0.78rem; font-weight: bold; color: var(--vermilion); width: 36px; }
    .gp-boss-hp-num { text-align: right; font-size: 0.72rem; font-weight: bold; color: var(--text-secondary); margin-top: 2px; }

    .gp-boss-status {
        text-align: center; font-size: 0.78rem; font-weight: bold;
        padding: 5px 12px; border-radius: 5px;
        background: #fdecea; border: 1px solid var(--vermilion);
        color: var(--vermilion); width: 100%;
    }

    .gp-boss-avatar {
        width: 80px; height: 80px; border-radius: 50%; object-fit: cover;
        border: 3px solid var(--vermilion); box-shadow: 0 3px 10px rgba(158, 42, 43, 0.25);
    }
    .gp-boss-name { font-size: 0.95rem; color: var(--text-gold); text-align: center; font-weight: bold; letter-spacing: 1px; }

    .gp-boss-btns { width: 100%; display: flex; flex-direction: column; gap: 6px; }
    .gp-boss-btn {
        width: 100%; display: flex; align-items: center; gap: 10px;
        background: #fdfcf7; border: 1px solid var(--gold-primary);
        color: var(--text-primary); font-family: 'Noto Serif TC', serif;
        font-size: 0.8rem; font-weight: bold; padding: 8px 10px;
        border-radius: 6px; cursor: pointer; transition: all 0.2s;
        box-shadow: 0 2px 4px rgba(92,80,67,0.08);
    }
    .gp-boss-btn:hover { background: #fdecea; border-color: var(--vermilion); color: var(--vermilion); }
    .gp-boss-ico {
        width: 24px; height: 24px; border-radius: 50%;
        background: rgba(158,42,43,0.1); border: 1px solid var(--vermilion);
        display: flex; align-items: center; justify-content: center;
        font-size: 0.75rem; flex-shrink: 0; color: var(--vermilion);
    }

    .gp-boss-desc {
        font-size: 0.72rem; color: var(--text-secondary); font-weight: bold;
        line-height: 1.5; border-top: 1px dashed var(--gold-border);
        padding-top: 8px; margin-top: auto; width: 100%;
    }

    /* ── Bottom env bar ──────────────────────────────────────── */
    .gp-env-bar {
        display: flex; align-items: center; gap: 10px;
        font-size: 0.88rem; font-weight: bold; padding: 6px 0;
    }
    .gp-env-bar label { color: var(--text-gold); }
    .gp-env-bar select {
        background: #fdfcf7; color: var(--text-primary);
        border: 1px solid var(--gold-primary); padding: 4px 12px;
        font-family: 'Noto Serif TC', serif; font-size: 0.85rem; font-weight: bold;
        border-radius: 4px; cursor: pointer; outline: none;
    }
    .gp-env-cur { color: var(--vermilion); font-size: 0.85rem; font-weight: bold; }

    /* ============================================================
       📱 MOBILE RESPONSIVE DESIGN (RWD 行動裝置極致相容優化)
    ============================================================ */
    @media (max-width: 840px) {
        .gp-wrapper { padding: 8px; gap: 8px; }
        .gp-topbar { padding: 4px 0; }
        .gp-title { font-size: 1.25rem; letter-spacing: 1px; }
        .gp-back { font-size: 0.82rem; }
        .gp-subtitle { display: none; }
        .gp-event-bar { font-size: 0.8rem; padding: 8px 10px; min-height: auto; }

        .gp-frame { display: flex; flex-direction: column; gap: 10px; padding: 8px; }

        .gp-left, .gp-right {
            flex-direction: row; flex-wrap: wrap; justify-content: space-between;
            padding: 10px 12px; gap: 8px;
        }
        .gp-player-avatar, .gp-boss-avatar { width: 50px; height: 50px; }
        .gp-player-label, .gp-boss-name { font-size: 0.85rem; }

        .gp-bars, .gp-boss-hp-section { width: auto; flex: 1; min-width: 140px; }
        .gp-skills, .gp-boss-btns { width: 100%; flex-direction: row; flex-wrap: wrap; gap: 6px; }
        .gp-skill-btn, .gp-boss-btn { flex: 1; min-width: 90px; padding: 6px 8px; font-size: 0.75rem; }
        
        .gp-clash-btn { margin-top: 0; width: 100%; padding: 10px; font-size: 0.9rem; }
        .gp-restart-btn { width: 100%; }

        .gp-battlefield-sides {

<script>
// Gold particle animation
(function() {
    const canvas = document.getElementById('particles-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;
    window.addEventListener('resize', () => {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    });
    const pts = Array.from({length: 45}, () => ({
        x: Math.random() * w,
        y: Math.random() * h,
        size: Math.random() * 1.6 + 0.4,
        sx: (Math.random() - 0.5) * 0.12,
        sy: -(Math.random() * 0.2 + 0.05),
        a: Math.random() * 0.3 + 0.1
    }));
    function tick() {
        ctx.clearRect(0, 0, w, h);
        pts.forEach(p => {
            p.x += p.sx;
            p.y += p.sy;
            if (p.y < 0) { p.y = h; p.x = Math.random() * w; }
            if (p.x < 0 || p.x > w) p.x = Math.random() * w;
            ctx.save();
            ctx.globalAlpha = p.a;
            ctx.fillStyle = '#8c6b12';
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        });
        requestAnimationFrame(tick);
    }
    tick();
})();
</script>
