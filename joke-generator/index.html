<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>😂 歡樂隨機笑話產生器 | Random Joke Generator</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            --card-bg: rgba(255, 255, 255, 0.25);
            --card-border: rgba(255, 255, 255, 0.4);
            --text-color: #2d3748;
            --accent-color: #ff6b6b;
            --accent-hover: #fa5252;
            --btn-secondary: rgba(255, 255, 255, 0.5);
            --btn-secondary-hover: rgba(255, 255, 255, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', 'Noto Sans TC', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
            padding: 20px;
            overflow-x: hidden;
        }

        /* Ambient floating circles */
        .decor-circle {
            position: absolute;
            border-radius: 50%;
            z-index: 0;
            filter: blur(50px);
            opacity: 0.6;
        }
        .circle-1 {
            width: 300px;
            height: 300px;
            background: #ffecd2;
            top: 10%;
            left: 10%;
        }
        .circle-2 {
            width: 250px;
            height: 250px;
            background: #fcb69f;
            bottom: 10%;
            right: 10%;
        }

        /* Card Container */
        .joke-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 550px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            z-index: 1;
            position: relative;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .joke-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.12);
        }

        /* Top Bar */
        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .back-btn {
            color: var(--text-color);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .back-btn:hover {
            opacity: 1;
        }

        .lang-toggle {
            display: flex;
            gap: 5px;
            background: rgba(0, 0, 0, 0.05);
            padding: 4px;
            border-radius: 20px;
        }

        .lang-btn {
            border: none;
            background: transparent;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            color: var(--text-color);
            opacity: 0.6;
            transition: all 0.3s ease;
        }

        .lang-btn.active {
            background: #ffffff;
            opacity: 1;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        /* Category Selection */
        .category-select-container {
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 17px;
            font-weight: 600;
        }

        .select-wrapper {
            position: relative;
            display: inline-block;
        }

        #category-select {
            appearance: none;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            padding: 10px 36px 10px 18px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-color);
            cursor: pointer;
            outline: none;
            transition: all 0.3s ease;
        }

        #category-select:hover {
            background: rgba(255, 255, 255, 0.6);
            border-color: var(--accent-color);
        }

        .select-wrapper::after {
            content: '\25BC';
            font-size: 10px;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: var(--text-color);
            opacity: 0.6;
        }

        /* Emoji display section */
        .emoji-display {
            font-size: 64px;
            margin-bottom: 20px;
            display: inline-block;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .emoji-display.animate {
            animation: bounceEmoji 0.6s ease;
        }

        /* Joke Content */
        .joke-content {
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-bottom: 35px;
        }

        .setup {
            font-size: 20px;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 15px;
            color: #1a202c;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
        }

        .punchline {
            font-size: 17px;
            font-weight: 500;
            line-height: 1.6;
            color: #4a5568;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease 0.2s;
        }

        .show-element {
            opacity: 1;
            transform: translateY(0);
        }

        /* Actions Section */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            border: none;
            border-radius: 50px;
            padding: 14px 28px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            width: 100%;
        }

        .btn-primary {
            background: var(--accent-color);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--btn-secondary);
            color: var(--text-color);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-secondary:hover {
            background: var(--btn-secondary-hover);
            transform: translateY(-2px);
        }

        .btn-secondary:active {
            transform: translateY(0);
        }

        /* Tooltip notification */
        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            bottom: 85px;
            left: 50%;
            transform: translateX(-50%) translateY(5px);
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .tooltip.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Animations */
        @keyframes bounceEmoji {
            0% { transform: scale(1); }
            30% { transform: scale(1.4) rotate(-15deg); }
            50% { transform: scale(0.9) rotate(15deg); }
            70% { transform: scale(1.1) rotate(-5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .joke-card {
                padding: 35px 20px;
            }
            .setup {
                font-size: 18px;
            }
            .punchline {
                font-size: 15px;
            }
            .category-select-container {
                flex-direction: column;
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="decor-circle circle-1"></div>
    <div class="decor-circle circle-2"></div>

    <div class="joke-card">
        <!-- Top Bar inside Card -->
        <div class="card-top">
            <a href="../index-zh.html" class="back-btn" id="back-btn">
                <i class="fa-solid fa-arrow-left"></i> <span id="back-text">返回首頁</span>
            </a>
            
            <div class="lang-toggle">
                <button class="lang-btn active" onclick="setLang('zh')">繁中</button>
                <button class="lang-btn" onclick="setLang('en')">EN</button>
            </div>
        </div>

        <!-- Category Dropdown Selector -->
        <div class="category-select-container">
            <span id="category-label"><i class="fa-solid fa-tags"></i> 選擇分類：</span>
            <div class="select-wrapper">
                <select id="category-select" onchange="onCategoryChange(this.value)">
                    <option value="all" id="opt-all">全部笑話</option>
                    <option value="breakfast" id="opt-breakfast">早餐店封膜笑話</option>
                    <option value="programmer" id="opt-programmer">工程師笑話</option>
                    <option value="ancient" id="opt-ancient">中國古代笑話</option>
                    <option value="cold" id="opt-cold">雙關冷笑話</option>
                    <option value="cold-war" id="opt-cold-war">冷戰政治笑話</option>
                    <option value="special" id="opt-special">你的特別笑話</option>
                    <option value="life" id="opt-life">職場與生活梗</option>
                </select>
            </div>
        </div>

        <!-- Animated emoji -->
        <span class="emoji-display" id="emoji-box">😂</span>

        <!-- Joke text wrapper -->
        <div class="joke-content">
            <div class="setup" id="setup-text">載入中...</div>
            <div class="punchline" id="punchline-text"></div>
        </div>

        <!-- Buttons -->
        <div class="actions">
            <button class="btn btn-primary" onclick="getRandomJoke()">
                <i class="fa-solid fa-face-laugh-beam"></i> <span id="next-btn-text">下一個笑話！</span>
            </button>
            
            <button class="btn btn-secondary" onclick="copyToClipboard()">
                <i class="fa-solid fa-copy"></i> <span id="copy-btn-text">複製笑話</span>
            </button>
        </div>
        
        <!-- Clipboard tooltip notification -->
        <div class="tooltip" id="copied-tooltip">已複製到剪貼簿！</div>
    </div>

    <!-- Script loading jokes database -->
    <script src="jokes.js"></script>
    <script>
        let currentLang = 'zh';
        let currentJoke = null;
        let selectedCategory = 'all';
        let lastIndex = -1;

        // Language text mappings
        const langPack = {
            zh: {
                backText: "返回首頁",
                nextBtn: "下一個笑話！",
                copyBtn: "複製笑話",
                copied: "已複製到剪貼簿！",
                loading: "正在尋找好笑的梗...",
                backLink: "../index-zh.html",
                categoryLabel: "選擇分類：",
                optAll: "全部笑話",
                optProgrammer: "工程師笑話",
                optCold: "雙關冷笑話",
                optColdWar: "冷戰政治笑話",
                optBreakfast: "早餐店封膜笑話",
                optAncient: "中國古代笑話",
                optSpecial: "你的特別笑話",
                optLife: "職場與生活梗"
            },
            en: {
                backText: "Back to Home",
                nextBtn: "Tell Me Another!",
                copyBtn: "Copy Joke",
                copied: "Copied to clipboard!",
                loading: "Finding a good one...",
                backLink: "../index.html",
                categoryLabel: "Category:",
                optAll: "All Jokes",
                optProgrammer: "Dev Jokes",
                optCold: "Pun Cold Jokes",
                optColdWar: "Cold War Politics",
                optBreakfast: "Cup-Lid Puns",
                optAncient: "Ancient Chinese",
                optSpecial: "My Special Jokes",
                optLife: "Workplace & Life"
            }
        };

        // Select language
        function setLang(lang) {
            currentLang = lang;
            
            // Toggle active buttons
            const btns = document.querySelectorAll('.lang-btn');
            btns.forEach(btn => {
                if(btn.textContent.trim().toLowerCase() === lang || (lang === 'zh' && btn.textContent.trim() === '繁中')) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            // Update UI static texts
            document.getElementById('back-text').textContent = langPack[lang].backText;
            document.getElementById('back-btn').setAttribute('href', langPack[lang].backLink);
            document.getElementById('next-btn-text').textContent = langPack[lang].nextBtn;
            document.getElementById('copy-btn-text').textContent = langPack[lang].copyBtn;
            document.getElementById('copied-tooltip').textContent = langPack[lang].copied;

            // Update category selector texts
            document.getElementById('category-label').innerHTML = `<i class="fa-solid fa-tags"></i> ${langPack[lang].categoryLabel}`;
            document.getElementById('opt-all').textContent = langPack[lang].optAll;
            document.getElementById('opt-programmer').textContent = langPack[lang].optProgrammer;
            document.getElementById('opt-cold').textContent = langPack[lang].optCold;
            document.getElementById('opt-cold-war').textContent = langPack[lang].optColdWar;
            document.getElementById('opt-breakfast').textContent = langPack[lang].optBreakfast;
            document.getElementById('opt-ancient').textContent = langPack[lang].optAncient;
            document.getElementById('opt-special').textContent = langPack[lang].optSpecial;
            document.getElementById('opt-life').textContent = langPack[lang].optLife;

            // Render current joke in selected language
            renderJoke();
        }

        // On category dropdown change
        function onCategoryChange(category) {
            selectedCategory = category;
            lastIndex = -1; // Reset tracking index when category changes
            getRandomJoke();
        }

        // Generate random joke
        function getRandomJoke() {
            if (!jokes || jokes.length === 0) return;

            // Filter jokes based on selectedCategory
            const filteredJokes = selectedCategory === 'all' 
                ? jokes 
                : jokes.filter(j => j.category === selectedCategory);

            if (filteredJokes.length === 0) {
                document.getElementById('setup-text').textContent = currentLang === 'zh' ? "此分類暫無笑話" : "No jokes in this category.";
                document.getElementById('punchline-text').textContent = "";
                return;
            }

            // Trigger emoji bounce animation
            const emojiBox = document.getElementById('emoji-box');
            emojiBox.classList.remove('animate');
            void emojiBox.offsetWidth; // Trigger reflow to restart animation
            emojiBox.classList.add('animate');

            // Hide previous text for transition
            const setupBox = document.getElementById('setup-text');
            const punchlineBox = document.getElementById('punchline-text');
            setupBox.classList.remove('show-element');
            punchlineBox.classList.remove('show-element');

            setTimeout(() => {
                let index;
                // Avoid picking the same joke twice in a row if there are multiple jokes in filtered list
                do {
                    index = Math.floor(Math.random() * filteredJokes.length);
                } while (index === lastIndex && filteredJokes.length > 1);

                lastIndex = index;
                currentJoke = filteredJokes[index];
                
                // Set Emoji
                emojiBox.textContent = currentJoke.emoji || "😂";
                
                // Show new text
                renderJoke();
            }, 300);
        }

        // Render current joke
        function renderJoke() {
            if (!currentJoke) return;

            const setupBox = document.getElementById('setup-text');
            const punchlineBox = document.getElementById('punchline-text');

            if (currentLang === 'zh') {
                setupBox.textContent = currentJoke.setupZh;
                punchlineBox.textContent = currentJoke.punchlineZh;
            } else {
                setupBox.textContent = currentJoke.setup;
                punchlineBox.textContent = currentJoke.punchline;
            }

            // Animate text fade-in
            setupBox.classList.add('show-element');
            setTimeout(() => {
                punchlineBox.classList.add('show-element');
            }, 200);
        }

        // Copy current joke to clipboard
        function copyToClipboard() {
            if (!currentJoke) return;

            const textToCopy = currentLang === 'zh' 
                ? `${currentJoke.setupZh}\n👉 ${currentJoke.punchlineZh}` 
                : `${currentJoke.setup}\n👉 ${currentJoke.punchline}`;

            navigator.clipboard.writeText(textToCopy).then(() => {
                const tooltip = document.getElementById('copied-tooltip');
                tooltip.classList.add('show');
                
                setTimeout(() => {
                    tooltip.classList.remove('show');
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy: ', err);
            });
        }

        // Initialize App
        window.onload = () => {
            // Detect browser language or default to 'zh'
            const browserLang = navigator.language || navigator.userLanguage;
            if (browserLang.toLowerCase().includes('en')) {
                setLang('en');
            } else {
                setLang('zh');
            }
            
            getRandomJoke();
        };
    </script>
</body>
</html>
